url: https://xec-cm.github.io/moat/

template:
  bootstrap: 5
  bootswatch: minty

development:
  mode: auto

home:
  title: "MOAT: Microbiome Omics Audit Toolkit"
  description: >
    Before crossing into microbiome analysis, check the moat. MOAT audits
    design confounding, batch-associated structure, correction identifiability,
    and validation leakage before downstream analysis.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: "Get started"
      href: articles/moat.html
    reference:
      text: "Reference"
      href: reference/index.html
    articles:
      text: "Articles"
      menu:
      - text: "Full audit workflow"
        href: articles/moat.html
      - text: "Validation leakage in ML"
        href: articles/leakage-ml.html
    news:
      text: "News"
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/xec-cm/moat/
      aria-label: "GitHub repository"

authors:
  Francesc Català-Moll:
    href: https://orcid.org/0000-0002-2354-8648

articles:
- title: "Workflows"
  navbar: "Workflows"
  contents:
  - moat
  - leakage-ml

search:
  exclude:
  - reference/moat_audit.html
  - reference/new_moat_audit.html
  - reference/print.moat_audit.html
  - reference/moat-package.html
  - reference/validate_moat_audit.html
  - reference/validate_biome_input.html

reference:
- title: "Start Here"
  desc: "Run a complete audit, summarize risk, plan downstream analysis, and visualize key diagnostics."
  contents:
  - moat
  - summary.moat_audit
  - autoplot.moat_audit
  - plan_analysis
  - report
  - plot_design
  - plot_ordination
  - plot_variance

- title: "Design And Correction Audits"
  desc: "Audit metadata confounding and evaluate whether batch adjustment is identifiable."
  contents:
  - check_design
  - check_metadata_predictability
  - check_continuous_design
  - check_balance
  - check_model_matrix
  - check_correction

- title: "Microbiome Distances And Batch Effects"
  desc: "Transform microbiome data, compute distances, and audit distance-based batch effects."
  contents:
  - transform_biome
  - compute_biome_distance
  - check_permanova
  - check_dispersion
  - check_batch

- title: "Leakage Audits"
  desc: "Detect repeated-measure and metadata-driven validation leakage risks."
  contents:
  - check_repeated_measures
  - check_leakage

- title: "Data And Audit Objects"
  desc: "Example data and lightweight audit object helpers."
  contents:
  - toy_moat
  - is_moat_audit

- title: "Package Helpers"
  contents:
  - "%>%"
